services:
  mock-api:
    build:
      context: ./mock-api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      PORT: 3001
    networks:
      - drone-viz-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  visualisation:
    build:
      context: ./visualisation
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://mock-api:3001
      CORS_ORIGIN: http://localhost:3000
    networks:
      - drone-viz-net
    depends_on:
      mock-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

networks:
  drone-viz-net:
    driver: bridge
